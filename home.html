<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">

  <header class="bg-surface/80 backdrop-blur-md fixed top-0 z-50 w-full border-b border-outline-variant/10 shadow-[0_20px_40px_-15px_rgba(44,62,80,0.04)]">
    <nav class="flex justify-between items-center w-full px-margin-desktop h-20 max-w-container-max mx-auto">
      <a href="home.html" class="font-headline-md text-headline-md text-primary tracking-tight">[App Name]</a>
      <div class="flex items-center gap-4">
        <button class="material-symbols-outlined text-primary hover:opacity-70 transition-opacity">search</button>
      </div>
    </nav>
  </header>

  <main class="flex-1 mt-20 px-margin-mobile md:px-margin-desktop py-stack-lg max-w-container-max mx-auto w-full">
    <header class="mb-stack-lg flex flex-col md:flex-row md:items-end justify-between gap-4">
      <div>
        <h1 class="font-headline-lg text-headline-lg text-primary mb-2">My Library</h1>
        <p class="font-body-md text-on-surface-variant max-w-xl">A curated collection of your intellectual journeys, summarized for clarity and focus.</p>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <button onclick="exportJSON()" class="flex items-center gap-2 border border-secondary text-secondary px-5 py-3 rounded-DEFAULT font-label-md hover:bg-secondary hover:text-on-secondary transition-all duration-300">
          <span class="material-symbols-outlined text-[18px]">download</span>
          EXPORT JSON
        </button>
        <label class="flex items-center gap-2 border border-secondary text-secondary px-5 py-3 rounded-DEFAULT font-label-md hover:bg-secondary hover:text-on-secondary transition-all duration-300 cursor-pointer">
          <span class="material-symbols-outlined text-[18px]">upload</span>
          IMPORT JSON
          <input type="file" accept=".json" onchange="importJSON(event)" class="hidden" />
        </label>
        <a href="add_book.html" class="flex items-center gap-2 border border-primary text-primary px-6 py-3 rounded-DEFAULT font-label-md hover:bg-primary hover:text-on-primary transition-all duration-300">
          <span class="material-symbols-outlined">add</span>
          ADD NEW BOOK
        </a>
      </div>
    </header>

    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-gutter" id="books-grid">
      <!-- Populated by home.js -->
    </section>
  </main>

  <a href="add_book.html" class="lg:hidden fixed bottom-8 right-8 w-14 h-14 bg-primary text-on-primary rounded-full shadow-xl flex items-center justify-center z-50 active:scale-95 transition-transform">
    <span class="material-symbols-outlined">add</span>
  </a>

  <footer class="bg-surface-container-lowest py-12 border-t border-outline-variant/5">
    <div class="flex flex-col md:flex-row justify-between items-center px-margin-desktop max-w-container-max mx-auto gap-stack-md w-full">
      <div class="text-label-md font-label-md font-bold text-primary">[App Name]</div>
      <div class="flex gap-8">
        <a class="text-outline hover:text-primary transition-colors font-label-sm" href="#">Privacy Policy</a>
        <a class="text-outline hover:text-primary transition-colors font-label-sm" href="#">Terms of Service</a>
        <a class="text-outline hover:text-primary transition-colors font-label-sm" href="#">Contact</a>
      </div>
      <div class="text-on-surface-variant opacity-60 font-label-sm">© 2024 [App Name]. All rights reserved.</div>
    </div>
  </footer>

  <script src="shared.js"></script>
  <script src="home.js"></script>
</body>
</html>
