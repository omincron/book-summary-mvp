<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Chapter | [App Name]</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="chapter.css" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'on-tertiary-container':      '#ff8371',
            'on-tertiary':                '#ffffff',
            'on-secondary-container':     '#4c6b60',
            'outline-variant':            '#c4c6cd',
            'error':                      '#ba1a1a',
            'surface-dim':                '#dbdad5',
            'on-secondary-fixed-variant': '#2f4c43',
            'on-surface-variant':         '#43474c',
            'secondary':                  '#46645a',
            'surface-container-lowest':   '#ffffff',
            'background':                 '#fbf9f4',
            'tertiary-fixed-dim':         '#ffb4a8',
            'on-secondary':               '#ffffff',
            'on-background':              '#1b1c19',
            'inverse-on-surface':         '#f2f1ec',
            'on-primary':                 '#ffffff',
            'on-surface':                 '#1b1c19',
            'surface-tint':               '#4e6073',
            'primary':                    '#162839',
            'inverse-surface':            '#30312e',
            'primary-container':          '#2c3e50',
            'on-primary-container':       '#96a9be',
            'tertiary':                   '#570000',
            'surface-container-high':     '#eae8e3',
            'surface-container':          '#f0eee9',
            'on-error-container':         '#93000a',
            'secondary-fixed':            '#c8eadd',
            'secondary-fixed-dim':        '#adcec1',
            'outline':                    '#74777d',
            'on-secondary-fixed':         '#012018',
            'tertiary-fixed':             '#ffdad4',
            'surface-bright':             '#fbf9f4',
            'primary-fixed-dim':          '#b5c8df',
            'on-primary-fixed-variant':   '#36485b',
            'on-error':                   '#ffffff',
            'error-container':            '#ffdad6',
            'on-tertiary-fixed-variant':  '#920703',
            'tertiary-container':         '#800000',
            'on-primary-fixed':           '#091d2e',
            'primary-fixed':              '#d1e4fb',
            'secondary-container':        '#c8eadd',
            'surface-container-highest':  '#e4e2dd',
            'surface-container-low':      '#f5f3ee',
            'surface':                    '#fbf9f4',
            'on-tertiary-fixed':          '#410000',
            'inverse-primary':            '#b5c8df',
            'surface-variant':            '#e4e2dd',
          },
          borderRadius: {
            DEFAULT: '0.125rem',
            lg:      '0.25rem',
            xl:      '0.5rem',
            full:    '0.75rem',
          },
          spacing: {
            'margin-mobile':  '16px',
            'base':           '8px',
            'margin-desktop': '48px',
            'stack-sm':       '12px',
            'stack-md':       '24px',
            'stack-lg':       '48px',
            'gutter':         '24px',
            'container-max':  '1140px',
          },
          fontFamily: {
            'headline-lg-mobile': ['Playfair Display'],
            'headline-lg':        ['Playfair Display'],
            'headline-md':        ['Playfair Display'],
            'body-lg':            ['"Source Serif 4"'],
            'body-md':            ['"Source Serif 4"'],
            'label-md':           ['Inter'],
            'label-sm':           ['Inter'],
          },
          fontSize: {
            'headline-lg-mobile': ['30px', { lineHeight: '1.2',  fontWeight: '700' }],
            'headline-lg':        ['40px', { lineHeight: '1.2',  letterSpacing: '-0.02em', fontWeight: '700' }],
            'headline-md':        ['28px', { lineHeight: '1.3',  fontWeight: '600' }],
            'body-lg':            ['18px', { lineHeight: '1.6',  fontWeight: '400' }],
            'body-md':            ['16px', { lineHeight: '1.6',  fontWeight: '400' }],
            'label-md':           ['14px', { lineHeight: '20px', letterSpacing: '0.02em', fontWeight: '500' }],
            'label-sm':           ['12px', { lineHeight: '16px', letterSpacing: '0.05em', fontWeight: '600' }],
          },
        },
      },
    };
  </script>
</head>

<body class="bg-background text-on-surface selection:bg-secondary-container/50 selection:text-on-secondary-container min-h-screen">

  <header class="bg-surface/80 backdrop-blur-md top-0 z-50 border-b border-outline-variant/10 shadow-[0_20px_40px_-15px_rgba(44,62,80,0.04)] sticky">
    <nav class="flex justify-between items-center w-full px-margin-desktop h-20 max-w-container-max mx-auto">
      <a href="home.html" class="font-headline-md text-headline-md text-primary tracking-tight">[App Name]</a>
      <div class="flex items-center gap-4">
        <button class="text-on-surface-variant hover:text-primary transition-colors" onclick="toggleSummaries()" title="Past summaries">
          <span class="material-symbols-outlined">history</span>
        </button>
      </div>
    </nav>
  </header>

  <main class="max-w-container-max mx-auto px-margin-desktop py-stack-lg flex flex-col md:flex-row gap-gutter relative">

    <!-- Left: Navigation -->
    <aside class="hidden lg:block w-64 flex-shrink-0 sticky top-32 h-fit">
      <a id="back-to-book-link" href="home.html" class="flex items-center gap-2 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors mb-6">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        Back to Book
      </a>
      <nav class="flex flex-col gap-stack-sm border-l border-outline-variant/20 pl-4">
        <p class="font-label-sm text-label-sm text-outline uppercase tracking-widest mb-2">This Chapter</p>
        <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors py-1" href="#chapter-preface">Preface</a>
        <a class="font-body-md text-body-md text-primary font-semibold marginalia-active -ml-[18px] pl-4 py-1" href="#chapter-summary">Summary</a>
        <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors py-1" href="#chapter-glossary">Glossary</a>
        <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors py-1" href="#chapter-characters">Characters</a>
      </nav>
    </aside>

    <!-- Center: Reading Column -->
    <div class="flex-grow max-w-[750px] mx-auto" id="chapter-content">
      <!-- Populated by chapter.js -->
    </div>

    <!-- Right: Past Summaries FAB -->
    <div class="hidden lg:block w-16 sticky top-32 h-fit">
      <button
        class="w-12 h-12 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-lg hover:scale-110 transition-transform group relative"
        onclick="toggleSummaries()"
      >
        <span class="material-symbols-outlined">history</span>
        <span class="absolute right-full mr-4 whitespace-nowrap bg-primary-container text-on-primary-container px-3 py-1 rounded text-label-sm opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">Past Summaries</span>
      </button>
    </div>

  </main>

  <!-- Past Summaries Side Panel -->
  <div class="fixed inset-y-0 right-0 w-full md:w-96 bg-surface-container-high z-[100] shadow-2xl sidebar-transition translate-x-full border-l border-outline-variant/10" id="summaries-panel">
    <div class="p-stack-md h-full flex flex-col">
      <div class="flex justify-between items-center mb-stack-lg">
        <h2 class="font-headline-md text-headline-md text-primary">Chronology</h2>
        <button class="text-on-surface-variant hover:text-primary" onclick="toggleSummaries()">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="flex-grow overflow-y-auto space-y-stack-md pr-2" id="summaries-list">
        <!-- Populated by chapter.js -->
      </div>
      <div class="mt-auto pt-stack-md border-t border-outline-variant/20">
        <a id="back-to-book-btn" href="home.html" class="w-full py-3 bg-primary text-on-primary font-label-md rounded flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
          <span class="material-symbols-outlined text-sm">book</span>
          Back to Book
        </a>
      </div>
    </div>
  </div>

  <footer class="bg-surface-container-lowest py-12 border-t border-outline-variant/5">
    <div class="flex flex-col md:flex-row justify-between items-center px-margin-desktop max-w-container-max mx-auto gap-stack-md">
      <div class="text-label-md font-label-md font-bold text-primary">[App Name]</div>
      <div class="flex gap-8">
        <a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors" href="#">Privacy Policy</a>
        <a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors" href="#">Terms of Service</a>
      </div>
      <p class="font-label-sm text-label-sm text-on-surface-variant">© [Year] [App Name]. All rights reserved.</p>
    </div>
  </footer>

  <!-- Panel overlay -->
  <div
    class="fixed inset-0 bg-primary/20 backdrop-blur-sm z-[90] hidden transition-opacity opacity-0"
    id="panel-overlay"
    onclick="toggleSummaries()"
  ></div>

  <script src="shared.js"></script>
  <script src="chapter.js"></script>
</body>
</html>
